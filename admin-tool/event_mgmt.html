<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GV 디스코드봇 운영 관리툴 - 이벤트 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <aside id="lnb"></aside>
    <main class="main-wrapper">
      <header class="top-header">
        <div class="page-breadcrumb">
          <span id="breadcrumbTitle">RO1</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">이벤트 관리</span>
        </div>
        <div class="page-title" id="pageTitle">이벤트 관리</div>
      </header>
      <div class="main-content">
        <div class="card">
          <!-- 데스크톱 필터 -->
          <div class="flex items-center justify-between mb-20 evt-desktop-filters">
            <div class="flex items-center gap-4">
              <h2 class="card-title mb-0">목록 <span class="list-count" id="evtListCount">총 0건</span></h2>
            </div>
            <div class="flex items-center gap-3">
              <div class="d-flex gap-8 align-center">
                <div class="filter-group" id="evtStatusFilter">
                  <button class="filter-btn active" data-filter="all">전체</button>
                  <button class="filter-btn" data-filter="running">진행 중</button>
                  <button class="filter-btn" data-filter="upcoming">예정</button>
                  <button class="filter-btn" data-filter="ended">종료</button>
                </div>
                <div class="search-input-wrapper">
                  <input type="text" class="form-control search-input-field" id="evtSearch" placeholder="이벤트명 검색">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-input-icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </div>
                <div class="daterange-picker" id="daterangePicker">
                  <div class="daterange-trigger" id="daterangeTrigger">
                    <span class="daterange-trigger-text" id="daterangeLabel">기간: 전체</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  </div>
                  <div class="daterange-dropdown" id="daterangeDropdown">
                    <div class="daterange-calendars">
                      <div class="daterange-calendar" id="calendarLeft"><div class="calendar-header"><button type="button" class="cal-nav-btn" id="prevYear">«</button><button type="button" class="cal-nav-btn" id="prevMonth">‹</button><span class="calendar-title" id="calLeftTitle"></span><span class="flex-1"></span></div><div class="calendar-grid" id="calLeftGrid"></div></div>
                      <div class="daterange-calendar" id="calendarRight"><div class="calendar-header"><span class="flex-1"></span><span class="calendar-title" id="calRightTitle"></span><button type="button" class="cal-nav-btn" id="nextMonth">›</button><button type="button" class="cal-nav-btn" id="nextYear">»</button></div><div class="calendar-grid" id="calRightGrid"></div></div>
                    </div>
                    <div class="daterange-footer">
                      <button type="button" class="btn btn-secondary btn-sm" id="daterangeReset">초기화</button>
                      <button type="button" class="btn btn-primary btn-sm" id="daterangeConfirm" disabled>저장</button>
                    </div>
                  </div>
                </div>
                <a class="btn btn-primary white-space-nowrap" id="evtNewBtn">새 이벤트</a>
              </div>
            </div>
          </div>

          <!-- 모바일 헤더 -->
          <div class="msg-mobile-header evt-mobile-header" style="display:none;">
            <h2 class="card-title mb-0">목록 <span class="list-count" id="evtListCountM">총 0건</span></h2>
            <button class="msg-filter-btn" id="evtMobileFilterBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg> 필터
            </button>
          </div>

          <!-- 데스크톱 테이블 -->
          <div class="table-container evt-desktop-table">
            <table class="data-table">
              <thead>
                <tr>
                  <th class="col-no">No.</th>
                  <th>이벤트명</th>
                  <th>구성</th>
                  <th>쿠폰 발송 방식</th>
                  <th>이벤트 기간</th>
                  <th>참여수</th>
                  <th>등록일</th>
                  <th>등록자</th>
                  <th class="col-status">진행상황</th>
                  <th class="col-action">관리</th>
                </tr>
              </thead>
              <tbody id="evtTableBody"></tbody>
            </table>
          </div>

          <!-- 모바일 카드 -->
          <div class="msg-mobile-list evt-mobile-list" id="evtMobileList" style="display:none;">
            <div class="msg-card-list" id="evtMobileCardBody"></div>
          </div>

          <div class="pagination" id="evtPagination"></div>
        </div>
      </div>
    </main>
    <!-- 모바일 FAB -->
    <a class="msg-fab" id="evtNewFab" style="display:none;text-decoration:none;">+</a>
  </div>

  <!-- 모바일 필터 오버레이 -->
  <div class="msg-filter-overlay" id="evtFilterOverlay">
    <div class="msg-filter-panel">
      <div class="msg-filter-panel-header"><h3>필터</h3><button class="msg-filter-panel-close" id="evtFilterClose">&times;</button></div>
      <div class="msg-filter-panel-body">
        <div class="msg-filter-section">
          <div class="search-input-wrapper" style="width:100%;"><input type="text" class="form-control search-input-field" id="evtMSearch" placeholder="이벤트명 검색"></div>
        </div>
        <div class="msg-filter-section">
          <div class="msg-filter-section-label">진행상황</div>
          <div class="msg-status-switches" id="evtMStatusSw">
            <button class="msg-status-sw active" data-val="all">전체</button>
            <button class="msg-status-sw" data-val="running">진행 중</button>
            <button class="msg-status-sw" data-val="upcoming">예정</button>
            <button class="msg-status-sw" data-val="ended">종료</button>
          </div>
        </div>
        <div class="msg-filter-section">
          <div class="msg-filter-section-label">이벤트 기간</div>
          <div class="msg-filter-dates">
            <input type="date" class="msg-filter-date-input" id="evtMDateStart">
            <input type="date" class="msg-filter-date-input" id="evtMDateEnd">
          </div>
        </div>
      </div>
      <div class="msg-filter-panel-footer"><button class="btn btn-primary" id="evtMFilterApply">조회하기</button></div>
    </div>
  </div>

  <script src="lnb.js"></script>
  <script src="api-client.js"></script>
  <script src="script.js"></script>
  <script src="event_mgmt.js"></script>
</body>
</html>
