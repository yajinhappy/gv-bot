<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GV DiscordBot Admin Tool</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>GV DiscordBot</h1>
        <p>GV 디스코드봇 운영 관리툴</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="login-id">아이디</label>
          <input type="text" id="login-id" class="form-control" placeholder="아이디를 입력하세요" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-pw">비밀번호</label>
          <input type="password" id="login-pw" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div id="loginError" style="display:none; color: #ef4444; font-size: 13px; margin-bottom: 12px; padding: 8px 12px; background: #fef2f2; border-radius: 6px;"></div>

        <div class="mt-4">
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">로그인</button>
        </div>
      </form>

      <div class="auth-footer">
        계정이 없으신가요? <a href="signup.html">계정 생성 요청</a>
      </div>
    </div>
  </div>

  <script src="api-client.js"></script>
  <script>
    // 이미 로그인 상태면 메인으로 이동
    if (getAuthToken()) {
      window.location.href = 'index.html';
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const loginId = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-pw').value;

      if (!loginId || !password) {
        errorEl.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
        errorEl.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '로그인 중...';

      try {
        const result = await apiLogin(loginId, password);
        if (result.success) {
          window.location.href = 'index.html';
        }
      } catch (error) {
        errorEl.textContent = error.message || '로그인에 실패했습니다.';
        errorEl.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = '로그인';
      }
    });
  </script>
</body>

</html>
