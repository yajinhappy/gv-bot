<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 - GV DiscordBot Admin Tool</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">

    <!-- LNB (Sidebar) -->
    <!-- LNB (Sidebar) - 공통 모듈 -->
    <aside id="lnb"></aside>

    <!-- Main Content -->
    <main class="main-wrapper">

      <header class="top-header">
        <div class="page-title">대시보드</div>
      </header>

      <div class="main-content">

        <!-- 요약 통계 카드 -->
        <div class="dashboard-grid">
          <div class="stat-card">
            <div class="stat-card-label">예약 대기</div>
            <div class="stat-card-value accent" id="statPendingCount">-</div>
            <div class="stat-card-sub">발송 예정 메시지</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">이번 달 발송 완료</div>
            <div class="stat-card-value" id="statSentCount">-</div>
            <div class="stat-card-sub">이번 달 기준</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">운영 중인 타이틀</div>
            <div class="stat-card-value" id="statTitleCount">2</div>
            <div class="stat-card-sub">RO1 · Ragnarok Monster Kitchen</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">운영자 수</div>
            <div class="stat-card-value" id="statOpCount">-</div>
            <div class="stat-card-sub">활성 계정 기준</div>
          </div>
        </div>

        <!-- 메시지 내역 + 이벤트 내역 -->
        <div class="dashboard-row">

          <!-- 메시지 내역 -->
          <div class="card">
            <div class="section-header">
              <h2 class="section-title">메시지 내역</h2>
              <a href="msg-mgmt.html" class="view-all-link">전체 보기 →</a>
            </div>
            <div class="activity-list" id="dashMessageList">
              <div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">로딩 중...</div>
            </div>
          </div>

          <!-- 이벤트 내역 -->
          <div class="card">
            <div class="section-header">
              <h2 class="section-title">이벤트 내역</h2>
              <a href="event_mgmt.html" class="view-all-link">전체 보기 →</a>
            </div>
            <div class="activity-list" id="dashEventList">
              <div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">로딩 중...</div>
            </div>
          </div>

        </div>

        <!-- 디스코드 서버 연결 상태 & 가입 승인 대기 -->
        <div class="dashboard-row">
          <div class="card">
            <div class="section-header">
              <h2 class="section-title">디스코드 서버 연결 상태</h2>
              <a href="#" class="view-all-link">타이틀별 설정 →</a>
            </div>
            <div class="server-status-list">
              <div class="server-status-item">
                <div class="server-status-left">
                  <div class="server-name">RO1 공식 서버</div>
                  <div class="server-game">RO1</div>
                </div>
                <span class="status-badge connected">연결됨</span>
              </div>
              <div class="server-status-item">
                <div class="server-status-left">
                  <div class="server-name">Monster Kitchen 공식 서버</div>
                  <div class="server-game">Ragnarok Monster Kitchen</div>
                </div>
                <span class="status-badge connected">연결됨</span>
              </div>
            </div>
          </div>

          <!-- 가입 승인 대기 (관리자 전용) -->
          <div class="card border-primary">
            <div class="section-header">
              <div class="d-flex align-center">
                <h2 class="section-title">가입 승인 대기 <span id="dashApprovalCount"
                    style="background:#ef4444; color:white; border-radius:10px; padding:2px 8px; font-size:12px; margin-left:8px;">0</span>
                </h2>
                <span class="badge-master">마스터 권한</span>
              </div>
              <a href="operator_mgmt.html" class="view-all-link">설정 →</a>
            </div>
            <div class="approval-list" id="dashApprovalList">
              <div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">로딩 중...</div>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script src="lnb.js"></script>
  <script src="api-client.js"></script>
  <script src="script.js"></script>
  <script>
    async function loadDashboardData() {
      try {
        const channels = await fetchChannels().catch(() => []);
        const channelMap = {};
        channels.forEach(ch => channelMap[ch.id] = ch.name);

        const ops = await fetchOperators();
        const activeOps = ops.filter(op => op.status === 'approved' || op.status === 'active');
        const pendingOps = ops.filter(op => op.status === 'pending');

        document.getElementById('dashApprovalCount').textContent = pendingOps.length;
        const listContainer = document.getElementById('dashApprovalList');
        if (pendingOps.length === 0) {
          listContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">승인 대기 중인 계정이 없습니다.</div>';
        } else {
          listContainer.innerHTML = pendingOps.slice(0, 3).map(op => `
            <div class="approval-item">
              <div class="approval-info">
                <div class="approval-name">${op.name} <span class="approval-id">(${op.email})</span></div>
                <div class="approval-meta">${op.team} · ${(op.created_at || '').substring(0, 16)}</div>
              </div>
              <div class="approval-actions">
                <a href="operator_mgmt.html" class="btn-approve" style="text-decoration:none; padding:4px 12px; display:inline-block;">관리로 이동</a>
              </div>
            </div>
          `).join('');
        }

        const statOpCountEl = document.getElementById('statOpCount');
        if (statOpCountEl) statOpCountEl.textContent = activeOps.length;

        const stats = await fetchMessageStats();
        if (stats) {
          const statPendingCountEl = document.getElementById('statPendingCount');
          if (statPendingCountEl) statPendingCountEl.textContent = stats.pending || 0;

          const statSentCountEl = document.getElementById('statSentCount');
          if (statSentCountEl) statSentCountEl.textContent = stats.sentThisMonth || 0;
        }

        const msgRes = await fetchMessages({ limit: 5 });
        const dashMessageList = document.getElementById('dashMessageList');
        if (dashMessageList && msgRes && msgRes.data) {
          if (msgRes.data.length === 0) {
            dashMessageList.innerHTML = '<div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">메시지 내역이 없습니다.</div>';
          } else {
            dashMessageList.innerHTML = msgRes.data.map(item => {
              const ids = (item.channel_id || '').toString().split(',').map(id => id.trim());
              const cName = ids.map(id => channelMap[id] ? '#' + channelMap[id] : id).join(', ');
              const title = item.content.length > 30 ? item.content.substring(0, 30) + '...' : item.content;
              const time = item.sent_at || item.scheduled_at;

              let statusColor = '#00ADEF'; // primary for pending
              let statusText = '예약 대기';
              if (item.status === 'sent') { statusColor = '#22c55e'; statusText = '발송 완료'; }
              else if (item.status === 'failed') { statusColor = '#ef4444'; statusText = '발송 실패'; }

              return `
                 <div class="activity-item" style="align-items: center;">
                   <div class="activity-dot" style="background:${statusColor}; margin-top: 0;"></div>
                   <div class="activity-content" style="cursor:pointer; flex: 1; min-width: 0;" onclick="window.location.href='message_detail.html?id=${item.id}'">
                     <div class="activity-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${title}</div>
                     <div class="activity-time">${(time || '').substring(0, 16).replace('T', ' ')} · RO1 ${cName}</div>
                   </div>
                   <div style="flex-shrink: 0; margin-left: 10px;">
                     <span style="font-size: 11px; font-weight: 700; color: ${statusColor}; background: ${statusColor}1A; padding: 4px 8px; border-radius: 6px;">${statusText}</span>
                   </div>
                 </div>`;
            }).join('');
          }
        }

        const dashEventList = document.getElementById('dashEventList');
        if (dashEventList) {
          try {
            const evRes = await fetch((window.API_CONFIG ? window.API_CONFIG.BASE_URL : '/api') + '/events', {
              headers: {
                'x-api-key': window.API_CONFIG ? window.API_CONFIG.API_KEY : '',
                'Authorization': 'Bearer ' + getAuthToken()
              }
            });
            const evData = await evRes.json();
            const events = evData.events || [];

            function nowKSTIso() {
              return new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 16);
            }

            function getEvtStatus(e) {
              if (e.status === 'inactive') return 'inactive';
              const now = nowKSTIso();
              if (now < e.start_date) return 'upcoming';
              if (now > e.end_date) return 'ended';
              return 'running';
            }

            if (events.length === 0) {
              dashEventList.innerHTML = '<div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">이벤트 내역이 없습니다.</div>';
            } else {
              dashEventList.innerHTML = events.slice(0, 5).map(item => {
                const _status = getEvtStatus(item);
                let statusColor = '#22c55e';
                let statusText = '진행 중';
                if (_status === 'upcoming') { statusColor = '#00ADEF'; statusText = '예약됨'; }
                else if (_status === 'ended' || _status === 'inactive') { statusColor = '#71717A'; statusText = '종료'; }

                const typeText = item.type === 'text' ? '일반 이벤트' : '이미지 인증';
                const title = item.title.length > 30 ? item.title.substring(0, 30) + '...' : item.title;

                return `
                   <div class="activity-item" style="align-items: center;">
                     <div class="activity-dot" style="background:${statusColor}; margin-top: 0;"></div>
                     <div class="activity-content" style="cursor:pointer; flex: 1; min-width: 0;" onclick="window.location.href='event_detail.html?id=${item.id}'">
                       <div class="activity-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${title}</div>
                       <div class="activity-time">${typeText} · ${(item.start_date || '').replace('T', ' ').substring(0, 16)} ~ ${(item.end_date || '').replace('T', ' ').substring(0, 16)}</div>
                     </div>
                     <div style="flex-shrink: 0; margin-left: 10px;">
                       <span style="font-size: 11px; font-weight: 700; color: ${statusColor}; background: ${statusColor}1A; padding: 4px 8px; border-radius: 6px;">${statusText}</span>
                     </div>
                   </div>`;
              }).join('');
            }
          } catch (e) {
            dashEventList.innerHTML = '<div style="padding: 20px; text-align: center; color: #888; font-size: 13px;">이벤트 내역을 불러오지 못했습니다.</div>';
          }
        }

      } catch (error) {
        console.error('대시보드 데이터 로드 실패:', error);
      }
    }

    // api-client.js 로드 후 실행 (requireAuth 이후)
    setTimeout(loadDashboardData, 500);
  </script>
</body>

</html>
